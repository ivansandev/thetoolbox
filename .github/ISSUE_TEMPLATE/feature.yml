name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: Describe the feature and the problem it solves.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Alternatives you considered, mockups, related apps, etc.
