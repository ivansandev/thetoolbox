name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 15.5 or 26.0"
    validations:
      required: true
  - type: input
    id: mac
    attributes:
      label: Mac model
      placeholder: 'e.g. MacBook Pro 14" M3'
  - type: input
    id: displays
    attributes:
      label: Display(s) involved
      placeholder: "e.g. built-in + Dell P3225QE over USB-C"
  - type: dropdown
    id: feature
    attributes:
      label: Which feature?
      options:
        - Monitor control (brightness / contrast / volume)
        - Brightness keys
        - Window management
        - Power (keep awake / display off)
        - Desktop toggles
        - Other / not sure
    validations:
      required: true
  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions
      options:
        - label: thetoolbox has Accessibility permission (System Settings → Privacy & Security → Accessibility)
