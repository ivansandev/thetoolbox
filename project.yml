name: thetoolbox
options:
  bundleIdPrefix: com.ivansandev
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # AppleSiliconDDC is vendored (Sources/thetoolbox/Vendor/AppleSiliconDDC) rather than
  # consumed via SPM: its ObjC target is header-only (no .o, which breaks the Xcode linker),
  # and its display-matching helpers are `internal` so they aren't usable across modules.
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "1.10.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.8.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  thetoolbox:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivansandev.thetoolbox
        PRODUCT_NAME: thetoolbox
        CODE_SIGN_ENTITLEMENTS: thetoolbox.entitlements
        # Local/ad-hoc signing so first builds work without a Development Team.
        # For the window-management feature, switch to a stable Development team
        # (see README) so the Accessibility permission survives rebuilds.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        DEAD_CODE_STRIPPING: YES
        COMBINE_HIDPI_IMAGES: YES
        # Vendored AppleSiliconDDC: bridging header declares the private IOAVService C API;
        # CoreDisplay provides those symbols, IOKit provides the registry symbols.
        SWIFT_OBJC_BRIDGING_HEADER: Sources/thetoolbox/Vendor/AppleSiliconDDC/AppleSiliconDDC-Bridging.h
        OTHER_LDFLAGS:
          - "-framework"
          - "CoreDisplay"
          - "-framework"
          - "IOKit"
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: thetoolbox
        CFBundleDisplayName: thetoolbox
        CFBundleIconFile: AppIcon.icns
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
